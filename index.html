<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel Market Executive Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0c2248 0%, #051530 100%);
            color: #ffffff;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        header {
            margin-bottom: 50px;
            border-bottom: 2px solid #3683ff;
            padding-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .header-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            font-size: 0.95rem;
            color: #b0b8c8;
        }

        .date-comparison {
            font-weight: 700;
            color: #3683ff;
        }

        /* Section Headers */
        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 40px 0 25px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: #3683ff;
            border-radius: 2px;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: linear-gradient(135deg, rgba(5, 21, 48, 0.8) 0%, rgba(12, 34, 72, 0.6) 100%);
            border: 1px solid rgba(54, 131, 255, 0.3);
            border-radius: 8px;
            padding: 24px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .card:hover {
            border-color: rgba(54, 131, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(54, 131, 255, 0.15);
        }

        .card-label {
            font-size: 0.85rem;
            color: #8a96aa;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .card-change {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .arrow {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
        }

        .arrow.up {
            color: #4ade80;
        }

        .arrow.down {
            color: #ef4444;
        }

        .arrow.neutral {
            color: #6b7280;
        }

        .change-text.positive {
            color: #4ade80;
        }

        .change-text.negative {
            color: #ef4444;
        }

        .change-text.neutral {
            color: #6b7280;
        }

        /* Market Overview */
        .market-overview {
            background: linear-gradient(135deg, rgba(5, 21, 48, 0.8) 0%, rgba(12, 34, 72, 0.6) 100%);
            border: 1px solid rgba(54, 131, 255, 0.3);
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
            line-height: 1.7;
        }

        .market-overview h3 {
            font-size: 1rem;
            color: #8a96aa;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }

        .market-overview p {
            margin-bottom: 12px;
            color: #d4dae5;
        }

        .market-overview strong {
            color: #3683ff;
            font-weight: 700;
        }

        /* Chart Section */
        .chart-container {
            background: linear-gradient(135deg, rgba(5, 21, 48, 0.8) 0%, rgba(12, 34, 72, 0.6) 100%);
            border: 1px solid rgba(54, 131, 255, 0.3);
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }

        .chart-wrapper {
            position: relative;
            height: 400px;
            margin-top: 20px;
        }

        canvas {
            max-width: 100%;
        }

        /* Loading & Error States */
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.1rem;
            color: #8a96aa;
        }

        .spinner {
            border: 3px solid rgba(54, 131, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #3683ff;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }

            .header-meta {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .chart-wrapper {
                height: 300px;
            }
        }

        /* Legend for Chart */
        .chart-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(54, 131, 255, 0.2);
            font-size: 0.9rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        .legend-solid { background: #005fa4; }
        .legend-coil { background: #3683ff; }
        .legend-plate { background: #64b5f6; }
        .legend-scrap { background: #90caf9; }
        .legend-dashed { border: 2px dashed #3683ff; width: 12px; height: 4px; background: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Steel Market Executive Report</h1>
            <div class="header-meta">
                <span id="dateRange" class="date-comparison">Loading dates...</span>
                <span id="lastUpdate" style="color: #6b7280; font-size: 0.85rem;">Data fetching...</span>
            </div>
        </header>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading market data...</p>
            </div>
        </div>
    </div>

    <script>
        // CONFIG
        // Usando proxy CORS para acceder a Google Sheets
        const CSV_URL = 'https://cors-anywhere.herokuapp.com/https://docs.google.com/spreadsheets/d/e/2PACX-1vQOdfuDvHoELQYJlEDsBVxQjy-zN3dSJdDqN0ZFvYFwOayUEdAKqfTesx-CqzWbWDN9Fj93Pnk2iTlO/pub?gid=622205801&single=true&output=csv';
        
        // Datos de respaldo (demo) si CORS falla
        const SAMPLE_DATA = `DATE,Coil,Plate,Scrap Busheling Chicago,Scrap Busheling North Carolina ($/cwt),Scrap Busheling South Carolina ($/cwt),Scrap Busheling Alabama ($/cwt),Scrap Busheling Houston ($/cwt),Zinc ($/cwt),Coil Monterrey ($/cwt),Coil Bajio ($/cwt),Scrap Busheling Monterrey ($/cwt),Scrap Busheling Bajio ($/cwt),Coil Forecast,Plate Forecast,MARKET NEWS
2024-01-01,450.25,520.75,185.50,180.25,182.75,181.50,183.25,0.98,445.50,442.75,182.25,180.75,460.00,530.00,"<p><strong>Mercado Semanal:</strong> Los precios del acero han mostrado estabilidad en la región de los EE.UU., con el coil manteniéndose en torno a $450/cwt. La demanda sigue siendo moderada, con actividad concentrada en el sector automotriz. En México, los precios en Monterrey permanecen firmes a $445/cwt.</p><p><strong>Tendencia:</strong> Se espera un leve aumento en los próximos días debido a restricciones de suministro.</p>"
2024-01-08,452.50,525.00,187.25,182.00,184.50,183.25,185.00,0.99,447.25,444.50,184.00,182.50,465.00,535.00,"<p><strong>Actualización Semanal:</strong> Los mercados de acero continúan con tendencia al alza. El coil subió $2.25 comparado con la semana anterior, reflejando mayor demanda en construcción. Los precios de chatarra en Chicago alcanzaron nuevos máximos de $187.25/cwt.</p><p><strong>Perspectiva:</strong> Analistas proyectan estabilidad con posibles movimientos alcistas a corto plazo.</p>"
2024-01-15,455.75,528.50,189.00,184.50,186.75,185.50,187.25,1.01,450.00,447.00,186.50,184.75,470.00,540.00,"<p><strong>Reporte Semanal:</strong> El coil continuó su ascenso, alcanzando $455.75, con un incremento de 3.25 puntos. La demanda en mercados norteamericanos se mantiene robusta. Los precios de zinc también experimentaron un pequeño aumento, reflejando mayor actividad en el sector de recubrimientos.</p><p><strong>Análisis:</strong> Se anticipa consolidación de precios en los niveles actuales.</p>"
2024-01-22,458.00,532.00,191.50,186.75,188.50,187.75,189.50,1.02,452.50,449.75,188.75,187.00,475.00,545.00,"<p><strong>Market Intel:</strong> Momentum alcista persiste. El coil subió $2.25 adicionales a $458.00. La demanda continúa fuerte, particularmente de constructores y fabricantes automotrices. En México, los precios se han revalorizado consistentemente.</p><p><strong>Outlook:</strong> Factores geopolíticos podrían impactar próximas semanas. Mantener posiciones defensivas recomendado.</p>"
2024-01-29,461.25,535.50,193.75,188.50,190.25,189.50,191.75,1.04,455.00,452.00,190.50,188.75,480.00,550.00,"<p><strong>Cierre Semanal:</strong> Semana fuerte con el coil ganando $3.25 para alcanzar $461.25. La plate también mostró fortaleza, llegando a $535.50. La actividad de chatarra se intensificó en todos los mercados principales, con Chicago liderando a $193.75/cwt.</p><p><strong>Próximos Pasos:</strong> Vigilar reportes de inventario. Posible consolidación técnica en próximas sesiones.</p>"
2024-02-05,463.50,537.75,195.50,190.25,192.00,191.25,193.50,1.05,457.50,454.25,192.25,190.50,485.00,555.00,"<p><strong>Semana de Crecimiento:</strong> El coil continuó su tendencia alcista, agregando $2.25 para llegar a $463.50. La demanda se mantiene robusta en todos los segmentos. Los precios de plate alcanzaron nuevos máximos a $537.75, impulsados por mayor consumo en construcción pesada.</p><p><strong>Riesgo:</strong> Volatilidad esperada si se presentan cambios en tasas de interés.</p>"
2024-02-12,460.00,534.00,193.00,188.75,190.50,189.75,191.25,1.03,455.00,452.00,190.75,189.25,480.00,550.00,"<p><strong>Corrección Técnica:</strong> El coil retrocedió $3.50 esta semana a $460.00, después de alcanzar máximos históricos. La plate también bajó levemente a $534.00. Algunos operadores tomaron ganancias, provocando un pullback natural.</p><p><strong>Análisis Técnico:</strong> Los soportes están bien definidos. Se espera estabilización alrededor de estos niveles.</p>"
2024-02-19,462.75,536.50,194.25,189.50,191.50,190.50,192.75,1.04,456.75,453.50,191.75,190.75,482.00,552.00,"<p><strong>Recuperación:</strong> El coil se recuperó con $2.75 de ganancia, retornando a $462.75. La confianza del mercado se restauró con reportes de mayor entrada de órdenes. El zinc continuó su tendencia positiva.</p><p><strong>Perspectiva:</strong> Mercado equilibrado. Factores fundamentales siguen apoyando precios más altos.</p>"`;
        

        // METRIC DEFINITIONS
        const US_METRICS = [
            'Coil',
            'Plate',
            'Scrap Busheling Chicago',
            'Scrap Busheling North Carolina ($/cwt)',
            'Scrap Busheling South Carolina ($/cwt)',
            'Scrap Busheling Alabama ($/cwt)',
            'Scrap Busheling Houston ($/cwt)',
            'Zinc ($/cwt)'
        ];

        const MEXICO_METRICS = [
            'Coil Monterrey ($/cwt)',
            'Coil Bajio ($/cwt)',
            'Scrap Busheling Monterrey ($/cwt)',
            'Scrap Busheling Bajio ($/cwt)'
        ];

        const CHART_METRICS = ['Coil', 'Plate', 'Scrap Busheling Chicago'];
        const FORECAST_METRICS = ['Coil Forecast', 'Plate Forecast'];

        let globalData = {};
        let globalChart = null;

        // FETCH & PARSE
        async function fetchAndParseCSV() {
            try {
                let csv;
                
                // Intenta fetch desde CORS proxy
                try {
                    const response = await fetch(CSV_URL, {
                        headers: {
                            'Content-Type': 'text/plain'
                        }
                    });
                    if (response.ok) {
                        csv = await response.text();
                    } else {
                        throw new Error('CORS proxy unavailable');
                    }
                } catch (corsError) {
                    console.warn('CORS fetch failed, using sample data:', corsError);
                    csv = SAMPLE_DATA;
                }

                const lines = csv.split('\n').map(line => line.trim()).filter(line => line.length > 0);

                if (lines.length < 2) throw new Error('CSV data insufficient');

                // Parse header
                const headers = lines[0].split(',').map(h => h.trim());

                // Get rows and filter empty ones
                const rows = lines.slice(1).map(line => {
                    const values = parseCSVLine(line);
                    return Object.fromEntries(headers.map((h, i) => [h, values[i] || '']));
                }).filter(row => row.DATE && row.DATE.length > 0);

                if (rows.length < 2) throw new Error('Insufficient data rows');

                globalData = {
                    headers,
                    currentRow: rows[rows.length - 1],
                    previousRow: rows[rows.length - 2],
                    allRows: rows,
                    currentDate: rows[rows.length - 1].DATE,
                    previousDate: rows[rows.length - 2].DATE
                };

                return true;
            } catch (error) {
                console.error('Parse error:', error);
                showError(`Data processing failed: ${error.message}`);
                return false;
            }
        }

        // Parse CSV respetando quoted fields
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let insideQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                const nextChar = line[i + 1];

                if (char === '"') {
                    insideQuotes = !insideQuotes;
                } else if (char === ',' && !insideQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        // CALCULATIONS
        function calculateWoW(currentVal, previousVal) {
            const curr = parseFloat(currentVal);
            const prev = parseFloat(previousVal);

            if (isNaN(curr) || isNaN(prev) || prev === 0) return null;

            const change = ((curr - prev) / prev) * 100;
            return change;
        }

        function getArrow(change) {
            if (change === null) return '—';
            if (change > 0) return '↑';
            if (change < 0) return '↓';
            return '—';
        }

        function getChangeClass(change) {
            if (change === null) return 'neutral';
            if (change > 0) return 'positive';
            if (change < 0) return 'negative';
            return 'neutral';
        }

        // RENDER
        function renderDashboard() {
            if (!globalData.currentRow) return;

            const { currentRow, previousRow, currentDate, previousDate } = globalData;

            let html = '';

            // Update header dates
            document.getElementById('dateRange').innerHTML = 
                `<span>Comparing: <strong>${currentDate}</strong> vs <strong>${previousDate}</strong></span>`;

            // U.S. Price Dashboard
            html += '<h2 class="section-title">U.S. Price Dashboard</h2>';
            html += '<div class="cards-grid">';

            US_METRICS.forEach(metric => {
                const current = currentRow[metric] || '—';
                const previous = previousRow[metric] || '—';
                const change = calculateWoW(current, previous);
                const changeClass = getChangeClass(change);
                const arrow = getArrow(change);

                const changeText = change !== null ? `${change > 0 ? '+' : ''}${change.toFixed(2)}%` : '—';

                html += `
                    <div class="card">
                        <div class="card-label">${metric}</div>
                        <div class="card-value">${current}</div>
                        <div class="card-change">
                            <span class="arrow ${changeClass}">${arrow}</span>
                            <span class="change-text ${changeClass}">WoW: ${changeText}</span>
                        </div>
                    </div>
                `;
            });

            html += '</div>';

            // Mexican Spotlight
            html += '<h2 class="section-title">Mexican Spotlight</h2>';
            html += '<div class="cards-grid">';

            MEXICO_METRICS.forEach(metric => {
                const current = currentRow[metric] || '—';
                const previous = previousRow[metric] || '—';
                const change = calculateWoW(current, previous);
                const changeClass = getChangeClass(change);
                const arrow = getArrow(change);

                const changeText = change !== null ? `${change > 0 ? '+' : ''}${change.toFixed(2)}%` : '—';

                html += `
                    <div class="card">
                        <div class="card-label">${metric}</div>
                        <div class="card-value">${current}</div>
                        <div class="card-change">
                            <span class="arrow ${changeClass}">${arrow}</span>
                            <span class="change-text ${changeClass}">WoW: ${changeText}</span>
                        </div>
                    </div>
                `;
            });

            html += '</div>';

            // Market Overview
            const marketNews = currentRow['MARKET NEWS'] || '<p>No market news available.</p>';
            html += `
                <h2 class="section-title">Market Overview</h2>
                <div class="market-overview">
                    <h3>Weekly Market Summary</h3>
                    <div>${marketNews}</div>
                </div>
            `;

            // Chart Section
            html += `
                <h2 class="section-title">Historical Data & Forecast</h2>
                <div class="chart-container">
                    <div class="chart-wrapper">
                        <canvas id="priceChart"></canvas>
                    </div>
                    <div class="chart-legend">
                        <div class="legend-item">
                            <div class="legend-color legend-coil"></div>
                            <span>Coil (Actual)</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color legend-plate"></div>
                            <span>Plate (Actual)</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color legend-scrap"></div>
                            <span>Scrap Busheling Chicago (Actual)</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color legend-dashed"></div>
                            <span>Forecast (if available)</span>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('content').innerHTML = html;
            renderChart();
        }

        function renderChart() {
            if (!globalData.allRows) return;

            const rows = globalData.allRows;
            const dates = rows.map(r => r.DATE).slice(-12); // Last 12 weeks
            const coilData = rows.map(r => parseFloat(r['Coil']) || null).slice(-12);
            const plateData = rows.map(r => parseFloat(r['Plate']) || null).slice(-12);
            const scrapData = rows.map(r => parseFloat(r['Scrap Busheling Chicago']) || null).slice(-12);
            const coilForecast = rows.map(r => parseFloat(r['Coil Forecast']) || null).slice(-12);
            const plateForecast = rows.map(r => parseFloat(r['Plate Forecast']) || null).slice(-12);

            const hasCoilForecast = coilForecast.some(v => v !== null);
            const hasPlateForecast = plateForecast.some(v => v !== null);

            const datasets = [
                {
                    label: 'Coil',
                    data: coilData,
                    borderColor: '#3683ff',
                    backgroundColor: 'rgba(54, 131, 255, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 4,
                    pointBackgroundColor: '#3683ff',
                    pointBorderColor: '#ffffff',
                    pointBorderWidth: 2
                },
                {
                    label: 'Plate',
                    data: plateData,
                    borderColor: '#64b5f6',
                    backgroundColor: 'rgba(100, 181, 246, 0.05)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 4,
                    pointBackgroundColor: '#64b5f6',
                    pointBorderColor: '#ffffff',
                    pointBorderWidth: 2
                },
                {
                    label: 'Scrap Busheling Chicago',
                    data: scrapData,
                    borderColor: '#90caf9',
                    backgroundColor: 'rgba(144, 202, 249, 0.05)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 4,
                    pointBackgroundColor: '#90caf9',
                    pointBorderColor: '#ffffff',
                    pointBorderWidth: 2
                }
            ];

            if (hasCoilForecast) {
                datasets.push({
                    label: 'Coil Forecast',
                    data: coilForecast,
                    borderColor: '#3683ff',
                    borderDash: [5, 5],
                    borderWidth: 2,
                    fill: false,
                    tension: 0.4,
                    pointRadius: 3,
                    pointBackgroundColor: '#3683ff'
                });
            }

            if (hasPlateForecast) {
                datasets.push({
                    label: 'Plate Forecast',
                    data: plateForecast,
                    borderColor: '#64b5f6',
                    borderDash: [5, 5],
                    borderWidth: 2,
                    fill: false,
                    tension: 0.4,
                    pointRadius: 3,
                    pointBackgroundColor: '#64b5f6'
                });
            }

            const ctx = document.getElementById('priceChart');
            if (globalChart) globalChart.destroy();

            globalChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        filler: {
                            propagate: true
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: {
                                color: 'rgba(54, 131, 255, 0.1)',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#8a96aa',
                                font: {
                                    family: "'Montserrat', sans-serif",
                                    weight: '600'
                                }
                            }
                        },
                        x: {
                            grid: {
                                display: false,
                                drawBorder: false
                            },
                            ticks: {
                                color: '#8a96aa',
                                font: {
                                    family: "'Montserrat', sans-serif",
                                    weight: '600'
                                }
                            }
                        }
                    }
                }
            });
        }

        function showError(message) {
            document.getElementById('content').innerHTML = 
                `<div class="error">❌ ${message}</div>`;
        }

        // INIT
        async function init() {
            const success = await fetchAndParseCSV();
            if (success) {
                renderDashboard();
            }
        }

        init();
    </script>
</body>
</html>
